<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ClearsignalQ — Healthcare Intelligence Platform</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00d68f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClearsignalQ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="ClearsignalQ">

<!-- Apple touch icons (generated via CSS) -->
<link rel="apple-touch-icon" href="/icon-192.png">

<!-- Open Graph for sharing -->
<meta property="og:title" content="ClearsignalQ">
<meta property="og:description" content="Healthcare Intelligence Platform">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#0a0e1a;
  --bg2:#0f1424;
  --surface:#141928;
  --surface2:#1a2035;
  --surface3:#1f2640;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --text:#e8eaf0;
  --text2:#8b93a8;
  --text3:#4a5168;
  --g:#00d68f;
  --gl:rgba(0,214,143,.12);
  --gd:#00a86b;
  --bl:#4d7cfe;
  --bll:rgba(77,124,254,.12);
  --am:#ffb547;
  --aml:rgba(255,181,71,.12);
  --rd:#ff4d6a;
  --rdl:rgba(255,77,106,.12);
  --pu:#a855f7;
  --pul:rgba(168,85,247,.12);
  --cy:#06b6d4;
  --cyl:rgba(6,182,212,.12);
  --r:10px;--rs:7px;
  --sh:0 4px 24px rgba(0,0,0,.4);
  --sh2:0 2px 8px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow:hidden}


/* PASSWORD SCREEN */
.pw-screen{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.pw-screen::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,214,143,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(77,124,254,.04) 0%,transparent 60%);pointer-events:none}
.pw-box{background:rgba(20,25,40,.95);border:1px solid rgba(0,214,143,.2);border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);max-width:420px;width:90%;position:relative;z-index:1}
.pw-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--g),var(--bl));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;margin:0 auto 20px;font-family:'Space Grotesk',sans-serif}
.pw-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.4px}
.pw-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.pw-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:.1em;margin-bottom:14px;transition:border-color .15s}
.pw-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,214,143,.1)}
.pw-btn{width:100%;padding:12px;background:var(--g);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.02em}
.pw-btn:hover{background:var(--gd)}
.pw-error{color:var(--rd);font-size:12px;margin-top:8px;display:none}

/* BACKGROUND PATTERN */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,214,143,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(77,124,254,.04) 0%,transparent 60%),radial-gradient(ellipse at 50% 50%,rgba(168,85,247,.02) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{display:flex;height:100vh;position:relative;z-index:1}

/* SIDEBAR */
.sb{width:220px;background:rgba(14,18,32,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;backdrop-filter:blur(20px)}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.lm{width:30px;height:30px;background:linear-gradient(135deg,var(--g),var(--bl));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:13px;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.lt{font-weight:700;font-size:14px;letter-spacing:-.2px;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.lt span{color:var(--g)}
.lv{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--g);background:var(--gl);padding:2px 7px;border-radius:99px;margin-left:auto;border:1px solid rgba(0,214,143,.2)}
.ld{width:5px;height:5px;background:var(--g);border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ns{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:12px 14px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;border-radius:0}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--gl);color:var(--g);font-weight:500}
.ni i{font-size:15px}
.nb{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center}
.nb-r{background:var(--rd);color:#fff}.nb-g{background:var(--g);color:#000}.nb-a{background:var(--am);color:#000}.nb-p{background:var(--pu);color:#fff}.nb-b{background:var(--bl);color:#fff}.nb-c{background:var(--cy);color:#000}
.dash-switch{padding:10px 10px 6px;display:flex;flex-direction:column;gap:3px}
.ds{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:none;width:100%;text-align:left;transition:all .15s;font-family:'Inter',sans-serif}
.ds.roi{background:var(--gl);color:var(--g);border:1px solid rgba(0,214,143,.2)}
.ds.auth{background:var(--rdl);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.ds.chart{background:var(--cyl);color:var(--cy);border:1px solid rgba(6,182,212,.2)}
.ds.inactive{background:var(--surface2);color:var(--text2);border:1px solid transparent}
.ds:hover{filter:brightness(1.1)}
.ds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:20px;background:transparent}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pt{font-size:20px;font-weight:700;letter-spacing:-.5px;flex:1;font-family:'Space Grotesk',sans-serif}
.psub{font-size:11px;color:var(--text2);margin-top:-8px}

/* STATUS BAR */
.sbar{background:rgba(20,25,40,.8);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:11px;backdrop-filter:blur(10px)}
.si2{display:flex;align-items:center;gap:5px;color:var(--text2)}
.sd{width:6px;height:6px;border-radius:50%}
.sg{background:var(--g)}.sam2{background:var(--am)}.sgr{background:var(--text3)}

/* CARDS */
.card{background:rgba(20,25,40,.85);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh2);backdrop-filter:blur(10px)}
.card-highlight{background:rgba(20,25,40,.9);border:1px solid rgba(0,214,143,.15);box-shadow:0 0 30px rgba(0,214,143,.05)}
.ct{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;font-family:'Space Grotesk',sans-serif}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sc{background:rgba(20,25,40,.8);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sv{font-size:24px;font-weight:700;letter-spacing:-.5px;font-family:'Space Grotesk',sans-serif}
.ss{font-size:11px;margin-top:3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface3);border-color:var(--border2)}
.btn-g{background:var(--g);color:#000;border-color:var(--g);font-weight:600}.btn-g:hover{background:var(--gd)}
.btn-b{background:var(--bl);color:#fff;border-color:var(--bl)}.btn-b:hover{background:#3d6ce8}
.btn-r{background:var(--rd);color:#fff;border-color:var(--rd)}
.btn-c{background:var(--cy);color:#000;border-color:var(--cy)}
.btn-sm{padding:4px 10px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.bh{background:rgba(0,214,143,.15);color:var(--g);border:1px solid rgba(0,214,143,.2)}
.bm{background:rgba(255,181,71,.15);color:var(--am);border:1px solid rgba(255,181,71,.2)}
.bl2{background:rgba(77,124,254,.15);color:var(--bl);border:1px solid rgba(77,124,254,.2)}
.bp{background:rgba(168,85,247,.15);color:var(--pu);border:1px solid rgba(168,85,247,.2)}
.bn{background:rgba(255,106,0,.15);color:#ff8c42;border:1px solid rgba(255,106,0,.2)}
.be{background:rgba(255,77,106,.15);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.bg2{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.bv{background:rgba(0,214,143,.15);color:var(--g);border:1px solid rgba(0,214,143,.3)}
.ba{background:rgba(255,77,106,.15);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.bcs{background:rgba(6,182,212,.15);color:var(--cy);border:1px solid rgba(6,182,212,.2)}

/* STREAM ITEMS */
.stream{display:flex;flex-direction:column;gap:8px}
.sitem{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;gap:11px;cursor:pointer;transition:all .15s;position:relative;background:var(--surface);overflow:hidden}
.sitem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sitem.sh::before{background:var(--g)}.sitem.sm2::before{background:var(--am)}.sitem.sl3::before{background:var(--bl)}.sitem.sa2::before{background:var(--rd)}.sitem.sc3::before{background:var(--cy)}
.sitem:hover{border-color:var(--border2);background:var(--surface2)}
.sitem.ni2{animation:sIn .35s ease}
@keyframes sIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.so{font-size:13px;font-weight:600;color:var(--text)}.sco{font-size:11px;color:var(--text2);margin:2px 0 5px}.sr{font-size:12px;color:var(--text);line-height:1.6}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.avg{background:rgba(0,214,143,.2);color:var(--g)}.avb{background:rgba(77,124,254,.2);color:var(--bl)}.avp{background:rgba(168,85,247,.2);color:var(--pu)}.ava{background:rgba(255,181,71,.2);color:var(--am)}.avr{background:rgba(255,77,106,.2);color:var(--rd)}.avc{background:rgba(6,182,212,.2);color:var(--cy)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl th{font-size:10px;font-weight:600;color:var(--text3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em}
.tbl td{font-size:12px;padding:10px 10px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface2);cursor:pointer}

/* AI BOX */
.ai-box{background:var(--surface2);border-radius:var(--rs);padding:14px;font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap;border:1px solid var(--border)}
.spin2{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g);padding:12px 0}
.sp{width:14px;height:14px;border:2px solid rgba(0,214,143,.2);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* FORMS */
input[type=text],input[type=email],textarea,select{padding:8px 12px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,214,143,.08)}
textarea{resize:vertical;min-height:75px}
label{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
select option{background:var(--surface2)}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.pstage{background:var(--surface);border-radius:var(--rs);padding:10px;min-height:200px;border:1px solid var(--border)}
.psh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.pcard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.pcard:hover{border-color:var(--border2);background:var(--surface3)}
.pco{font-size:12px;font-weight:600;color:var(--text)}.pcn{font-size:11px;color:var(--text2)}.pcv{font-size:11px;font-weight:600;color:var(--g);margin-top:4px}

/* MISC */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row{display:flex;gap:8px;align-items:center}
.rw{display:flex;gap:5px;flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:10px 0}
.erow{display:flex;padding:9px 13px;border-bottom:1px solid var(--border);font-size:12px;gap:10px}
.erow:last-child{border-bottom:none}
.el{color:var(--text2);width:135px;flex-shrink:0;font-size:11px}
.ev{color:var(--text);flex:1;line-height:1.5}
.et{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--surface)}
.scb{height:3px;background:var(--surface3);border-radius:2px;margin-top:3px}
.scf{height:100%;border-radius:2px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.ticker{background:linear-gradient(90deg,rgba(0,214,143,.06),rgba(77,124,254,.06));border:1px solid rgba(0,214,143,.15);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:11px;color:var(--text2)}
/* MOBILE PWA STYLES */
@media (max-width: 768px) {
  .app{flex-direction:column}
  .sb{width:100%;height:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);padding:8px}
  .sb .logo{display:none}
  .ns{display:none}
  .ni{flex-direction:column;gap:2px;padding:6px 10px;font-size:10px;min-width:60px;text-align:center}
  .ni i{font-size:18px}
  .ni .nb{position:absolute;top:2px;right:2px;font-size:8px;padding:1px 4px}
  .dash-switch{flex-direction:row;padding:4px}
  .ds{padding:6px 8px;font-size:10px}
  .main{padding:12px}
  .sg4{grid-template-columns:repeat(2,1fr)}
  .pipeline{grid-template-columns:repeat(3,1fr)}
  .email-panel{width:100%;right:0;left:0}
  .pw-box{padding:28px 24px}
}
@media (max-width: 480px) {
  .sg4{grid-template-columns:1fr 1fr}
  .pipeline{grid-template-columns:repeat(2,1fr)}
  .pt{font-size:16px}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
}
/* Safe area for iPhone notch */
.main{padding-bottom:env(safe-area-inset-bottom, 20px)}
.sb{padding-top:env(safe-area-inset-top, 0)}

.toast-c{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:9999}
.toast{background:var(--surface2);color:var(--text);border:1px solid var(--border2);padding:9px 16px;border-radius:var(--rs);font-size:12px;animation:tIn .2s ease;box-shadow:var(--sh)}
@keyframes tIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.glow-g{box-shadow:0 0 20px rgba(0,214,143,.1)}
.glow-r{box-shadow:0 0 20px rgba(255,77,106,.1)}
.glow-c{box-shadow:0 0 20px rgba(6,182,212,.1)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--g);background:var(--gl)}
.rfp-card{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;background:var(--surface)}
.alert-signal{font-size:11px;color:var(--g);background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.15);padding:5px 9px;border-radius:5px;margin-top:6px;line-height:1.5}
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div class="pw-screen" id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">C</div>
    <div class="pw-title">ClearsignalQ</div>
    <div class="pw-sub">Healthcare Intelligence Platform<br>Enter your access password to continue</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPW()">
    <button class="pw-btn" onclick="checkPW()"><i class="ti ti-lock-open" style="margin-right:6px"></i>Access Platform</button>
    <div class="pw-error" id="pw-error">Incorrect password. Please try again.</div>
  </div>
</div>

<div class="app">
<!-- SIDEBAR -->
<div class="sb">
  <div class="logo">
    <div class="lm">C</div>
    <div class="lt">Clearsignal<span>Q</span></div>
    <div class="lv"><div class="ld"></div>LIVE</div>
  </div>
  <div class="ns">Dashboards</div>
  <div class="dash-switch">
    <button class="ds roi" id="ds-roi" onclick="switchDash('roi')"><div class="ds-dot" style="background:var(--g)"></div>ROI Intelligence</button>
    <button class="ds inactive" id="ds-auth" onclick="switchDash('auth')"><div class="ds-dot" style="background:var(--rd)"></div>Denials</button>
    <button class="ds inactive" id="ds-chart" onclick="switchDash('chart')"><div class="ds-dot" style="background:var(--cy)"></div>Third Party Software Leads</button>
  </div>
  <div class="ns">Intelligence</div>
  <button class="ni active" onclick="nav('alerts')"><i class="ti ti-bell-ringing"></i>Live Alerts<span class="nb nb-r" id="nb-al">0</span></button>
  <button class="ni" onclick="nav('jobs')"><i class="ti ti-briefcase"></i>Job Signals<span class="nb nb-p" id="nb-jo">0</span></button>
  <button class="ni" onclick="nav('news')"><i class="ti ti-news"></i>News Monitor<span class="nb nb-a" id="nb-ne">0</span></button>
  <button class="ni" onclick="nav('rfp')"><i class="ti ti-file-search"></i>RFP Monitor<span class="nb nb-b" id="nb-rfp">4</span></button>
  <button class="ni" onclick="nav('contracts')"><i class="ti ti-file-description"></i>Contracts<span class="nb nb-r" id="nb-co">3</span></button>
  <div class="ns">Prospecting</div>

}

  render();
}

function filterBar(allTypes,filterId,filterFn){
  const types=['All','Channel','Provider Direct',...[...new Set(allTypes)].sort()];
  return '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px" id="'+filterId+'">' +

function applyFilterBtn(btn){
  const filterId = btn.dataset.fid;
  const val = btn.dataset.fval;
  applyFilter(filterId, btn, val);
}

let activeFilters={roi:'All',auth:'All',chart:'All'};

function applyFilter(bid,btn,val){
  const dash=bid.replace('fbar-','');
  activeFilters[dash]=val;
  document.querySelectorAll(`#${bid} .fchip`).forEach(b=>{
    b.style.background='var(--surface2)';
    b.style.color='var(--text2)';
    b.style.borderColor='var(--border2)';
    b.classList.remove('factive');
  });
  btn.style.background=val==='Channel'?'rgba(0,214,143,.15)':val==='Provider Direct'?'rgba(77,124,254,.15)':'var(--surface3)';
  btn.style.color=val==='Channel'?'var(--g)':val==='Provider Direct'?'var(--bl)':'var(--text)';
  btn.style.borderColor=val==='Channel'?'rgba(0,214,143,.3)':val==='Provider Direct'?'rgba(77,124,254,.3)':'var(--border)';
  btn.classList.add('factive');
  if(dash==='roi') renderROI();
  else if(dash==='auth') renderAuth();
  else renderChart();
}

function filterLeads(leads,dash){
  const f=activeFilters[dash];
  if(f==='All') return leads;
  if(f==='Channel') return leads.filter(l=>l.dealType==='channel');
  if(f==='Provider Direct') return leads.filter(l=>l.dealType==='provider');
  return leads.filter(l=>l.orgType===f);
}

function importCSV(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n');
    const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
    let added=0;
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const row={};

function moveDeal(id,s){
  const stages=['New','Contacted','Meeting Booked','Proposal Sent','Closed'];
  const idx=stages.indexOf(s);
  if(idx>=stages.length-1){showToast('Already at Closed!');return;}
  const next=stages[idx+1];
  const deal=pipeline[s].find(d=>d.id===id);
  pipeline[s]=pipeline[s].filter(d=>d.id!==id);
  if(!pipeline[next])pipeline[next]=[];
  deal.days=0;pipeline[next].push(deal);
  showToast(`Moved to ${next}!`);renderPipeline();
}

function addDeal(){
  if(!pipeline['New'])pipeline['New']=[];
  pipeline['New'].unshift({id:'p'+Date.now(),contact:'New contact',company:'Organization',value:'$50K',product:'ROI',days:0,note:'Add details'});
  renderPipeline();
}

function extractText(d){
  if(!d) return 'ERROR: No response from server';
  // Handle API errors
  if(d.type === 'error' || d.error) {
    const msg = d.error?.message || JSON.stringify(d.error) || 'Unknown error';
    return 'API ERROR: ' + msg + '\n\nCheck your API key in Railway Variables.';
  }
  if(!d.content || !Array.isArray(d.content)) {
    return 'ERROR: Unexpected response format: ' + JSON.stringify(d).substring(0,300);
  }
  // Collect all text blocks
  const texts = d.content
    .filter(b => b.type === 'text' && b.text && b.text.trim())
    .map(b => b.text.trim());
  if(texts.length > 0) return texts.join('\n\n');
  return 'ERROR: No text in response. Full response: ' + JSON.stringify(d).substring(0,300);
}

function emailCard(txt,name,type,email,org,product){
  const id='e'+Date.now();
  const lines=txt.split('\n');
  const subj=lines[0].replace('Subject:','').trim();
  // Store draft data globally to avoid quote escaping issues
  window._pendingDraft={id,name,org,subj:subj.substring(0,40),product,email,body:txt};
  return `<div class="card" style="border-color:rgba(0,214,143,.15)">
    <div class="ct" style="color:var(--g)"><i class="ti ti-file-text"></i>${type} — ${name} <span class="badge bg2">${product}</span></div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;background:rgba(255,181,71,.08);border:1px solid rgba(255,181,71,.15);padding:5px 10px;border-radius:5px"><i class="ti ti-info-circle" style="font-size:11px;margin-right:4px"></i>Draft only — copy to your email client to send</div>
    <div class="ai-box">${txt}</div>
    <div style="font-size:11px;color:var(--text2);background:var(--surface2);border-radius:var(--rs);padding:7px 10px;margin-top:8px;display:flex;align-items:center;gap:6px">
      <i class="ti ti-info-circle" style="font-size:12px;color:var(--am)"></i>
      Copy this draft, paste into Outlook, send — then click <strong style="color:var(--g)">Mark as Sent</strong> below to log it and schedule your follow-up.
    </div>
    <div class="row" style="gap:7px;margin-top:10px;flex-wrap:wrap">
      <button class="btn btn-g btn-sm" onclick="copyPendingDraft()"><i class="ti ti-copy"></i>Copy to clipboard</button>
      <button class="btn btn-sm" style="background:var(--g);color:#000;border-color:var(--g);font-weight:600" onclick="markAsSent()"><i class="ti ti-check"></i>Mark as Sent</button>
      <button class="btn btn-sm" onclick="savePendingDraft()"><i class="ti ti-device-floppy"></i>Save draft</button>
      <button class="btn btn-sm" onclick="document.getElementById('email-panel').style.display='none'"><i class="ti ti-x"></i>Close</button>
    </div>
  </div>`;
}

function savePendingDraft(){
  if(!window._pendingDraft)return;
  const d=window._pendingDraft;
  drafts.unshift({id:d.id,to:d.email||d.name.toLowerCase().replace(/\s+/g,'.')+'@'+d.org.toLowerCase().replace(/\s+/g,'')+'.com',toName:d.name,org:d.org,subject:d.subj,body:d.body,created:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),status:'draft',followUpDue:null,followUpDone:false,seq:1,product:d.product});
  document.getElementById('nb-ob').textContent=drafts.length;
  showToast('Draft saved!');
}

function copyPendingDraft(){
  if(!window._pendingDraft)return;
  navigator.clipboard.writeText(window._pendingDraft.body).catch(()=>{});
  showToast('Copied to clipboard!');
}

function openMailClient(){
  if(!window._pendingDraft)return;
  window.location.href='mailto:'+window._pendingDraft.email+'?subject='+encodeURIComponent(window._pendingDraft.subj);
}

function markAsSent(){
  if(!window._pendingDraft)return;
  const d=window._pendingDraft;
  // Calculate follow-up date 7 days from now
  const followUp = new Date();
  followUp.setDate(followUp.getDate()+7);
  const followUpStr = followUp.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  
  // Save to drafts as sent
  const existing = drafts.find(x=>x.id===d.id);
  if(existing){
    existing.status='sent';
    existing.followUpDue=followUpStr;
    existing.followUpDone=false;
  } else {
    drafts.unshift({
      id:d.id,
      to:d.email||'',
      toName:d.name,
      org:d.org,
      subject:d.subj,
      body:d.body,
      created:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      status:'sent',
      followUpDue:followUpStr,
      followUpDone:false,
      seq:1,
      product:d.product
    });
  }
  
  document.getElementById('nb-ob').textContent=drafts.length;
  
  // Show confirmation in panel
  const panel = document.getElementById('email-panel-content');
  if(panel){
    panel.innerHTML=`
      <div style="text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:10px">✅</div>
        <div style="font-size:14px;font-weight:600;color:var(--g);margin-bottom:6px">Marked as sent!</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px">Follow-up reminder set for <strong style="color:var(--am)">${followUpStr}</strong></div>
        <div style="font-size:11px;color:var(--text2);background:var(--surface2);padding:8px 12px;border-radius:var(--rs);margin-bottom:12px">
          You'll see this in <strong>Email Drafts</strong> with a follow-up button when the reminder fires.
        </div>
        <button class="btn btn-sm" onclick="document.getElementById('email-panel').style.display='none'"><i class="ti ti-x"></i>Close</button>
      </div>`;
  }
  
  showToast('✅ Email logged! Follow-up reminder: '+followUpStr);
}


function saveDraft(id,name,org,subj,product,email,body){
  drafts.unshift({id,to:email||name.toLowerCase().replace(/\s+/g,'.')+'@'+org.toLowerCase().replace(/\s+/g,'')+'.com',toName:name,org,subject:subj,body,created:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),status:'draft',followUpDue:null,followUpDone:false,seq:1,product});
  document.getElementById('nb-ob').textContent=drafts.length;
  showToast('Draft saved!');
}

function getEA(){
  // Use persistent floating panel so drafts survive re-renders
  const panel = document.getElementById('email-panel');
  const panelContent = document.getElementById('email-panel-content');
  if(panel && panelContent) {
    panel.style.display = 'block';
    return panelContent;
  }
  return document.getElementById('ea')||document.getElementById('enrich-email')||document.getElementById('followup-area');
}

async function runScan(){
  if(isScanning)return;
  isScanning=true;totalScans++;lastScan=new Date();
  try{updateSbar();}catch(e){}
  const queries=[
    {type:'jobs',q:'release of information specialist HIM healthcare hiring 2026'},
    {type:'news',q:'healthcare EHR migration HIPAA settlement MSO acquisition 2026 site:beckershospitalreview.com OR site:healthcareitnews.com'},
    {type:'jobs',q:'"health information management" director manager ROI job posting May 2026'},
    {type:'news',q:'prior authorization denial Medicare Advantage healthcare revenue cycle 2026'},
  ];
  const q=queries[totalScans%queries.length];
  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20251001',max_tokens:900,useWebSearch:true,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`Search: "${q.q}"\n\nYou are a healthcare B2B intelligence monitor for ClearsignalQ. After searching, return ONLY a JSON array of 2-4 real signal items:\n[{"type":"${q.type}","org":"org name","headline":"specific 1-sentence finding","signal":"why this matters for ROI/the denial recovery platform/ChartSwap in 1-2 sentences","urgency":"high|medium|low","contact":"likely decision-maker title","location":"city, state","tags":["tag1","tag2"],"source":"publication","date":"date if known"}]\nONLY valid JSON array. No markdown.`}]})});
    const data=await res.json();
    // Extract all text from response including web search results
    let raw='';
    for(const b of(data.content||[])){
      if(b.type==='text') raw+=b.text;
      // Also check tool_result blocks which contain search results
      if(b.type==='tool_result'&&b.content){
        for(const c of(Array.isArray(b.content)?b.content:[b.content])){
          if(c.type==='text') raw+=c.text;
        }
      }
    }
    raw=raw.replace(/```json|```/g,'').trim();
    console.log('Scan raw response length:', raw.length, raw.substring(0,200));
    const s=raw.indexOf('['),e=raw.lastIndexOf(']');
    if(s!==-1&&e!==-1){
      const items=JSON.parse(raw.substring(s,e+1));
      const now=new Date();
      items.forEach(item=>{
        const a={...item,id:'a'+Date.now()+Math.random(),receivedAt:now.toLocaleTimeString(),isNew:true};
        if(q.type==='jobs'){liveJobs.unshift(a);if(liveJobs.length>50)liveJobs=liveJobs.slice(0,50);}
        else{liveNews.unshift(a);if(liveNews.length>50)liveNews=liveNews.slice(0,50);}
        liveAlerts.unshift(a);if(liveAlerts.length>100)liveAlerts=liveAlerts.slice(0,100);
      });
      document.getElementById('nb-al').textContent=liveAlerts.length;
      document.getElementById('nb-jo').textContent=liveJobs.length;
      document.getElementById('nb-ne').textContent=liveNews.length;
      if(items.some(i=>i.urgency==='high'))showToast(`🔔 ${items.filter(i=>i.urgency==='high').length} high-priority signal detected`);
      setTimeout(()=>liveAlerts.forEach(a=>a.isNew=false),5000);
    }
  }catch(err){
    console.error('Scan error:', err.message);
    // Show error in alerts area if visible
    if(currentPage==='alerts'||currentPage==='jobs'||currentPage==='news'){
      const errDiv = document.createElement('div');
      errDiv.className='card';
      errDiv.style='border-color:rgba(255,77,106,.3);margin-top:10px';
      errDiv.innerHTML='<div style="font-size:12px;color:var(--rd);padding:10px"><strong>Scan error:</strong> '+err.message+'</div>';
      const main = document.getElementById('main');
      if(main) main.appendChild(errDiv);
    }
  }
  isScanning=false;
  try{updateSbar();}catch(e){}
  try{if(['alerts','jobs','news'].includes(currentPage))render();}catch(e){}
}

function updateSbar(){
  const sb=document.getElementById('sbar');

  sb.innerHTML=`
    <div class="si2"><div class="sd ${isScanning?'sam2':'sg'}"></div>${isScanning?'Scanning now...':'Live — every 90s'}</div>
    <div class="si2"><div class="sd sg"></div>Job boards: Indeed, ZipRecruiter, LinkedIn</div>
    <div class="si2"><div class="sd sg"></div>News: Becker's, Health IT News, HHS.gov</div>
    <div class="si2"><div class="sd sg"></div>Last: ${lastScan?lastScan.toLocaleTimeString():'—'} · Scans: ${totalScans}</div>

function deleteContact(idx){

function importContactFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split('\n').filter(l=>l.trim());
    if(lines.length < 2){showToast('File appears empty');return;}
    
    // Parse headers — handle quoted CSV
    const parseCSVLine = line => {
      const result = [];
      let current = '';
      let inQuotes = false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"') inQuotes=!inQuotes;
        else if(line[i]===',' && !inQuotes){result.push(current.trim());current='';}
        else current+=line[i];
      }
      result.push(current.trim());
      return result;
    };
    
    const headers = parseCSVLine(lines[0]).map(h=>h.replace(/"/g,'').trim().toLowerCase());
    
    // Smart column mapping
    const findCol = (...keys) => {
      for(const k of keys){
        const idx = headers.findIndex(h=>h.includes(k.toLowerCase()));
        if(idx>=0) return idx;
      }
      return -1;
    };
    
    const colMap = {
      name:    findCol('full name','name','contact name','first name'),
      fname:   findCol('first name','firstname'),
      lname:   findCol('last name','lastname','surname'),
      title:   findCol('title','job title','position','role'),
      company: findCol('company','organization','account','employer','firm'),
      email:   findCol('email','e-mail','email address'),
      phone:   findCol('phone','mobile','cell','direct phone','telephone'),
      linkedin:findCol('linkedin','profile url','linkedin url'),
      location:findCol('location','city','state','address'),
      website: findCol('website','domain','url','web'),
    };
    
    let added = 0;
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim()) continue;
      const vals = parseCSVLine(lines[i]);
      const get = col => col>=0 && col<vals.length ? vals[col].replace(/^"|"$/g,'').trim() : '';
      
      const fname = get(colMap.fname);
      const lname = get(colMap.lname);
      const fullName = get(colMap.name) || (fname&&lname ? fname+' '+lname : fname||lname||'');
      const company = get(colMap.company);
      
      if(!fullName && !company) continue;
      
      contactStorage.push({
        name: fullName, title: get(colMap.title),
        company, email: get(colMap.email),
        phone: get(colMap.phone), location: get(colMap.location),
        linkedin: get(colMap.linkedin), website: get(colMap.website),
        source: 'Excel', addedAt: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
      });
      added++;
    }
    showToast('✓ Imported '+added+' contacts from '+file.name);
    renderContactStorage();
  };
  reader.readAsText(file);
}

async function extractLinkedIn(){
  const text = document.getElementById('li-paste').value.trim();
  if(!text){showToast('Paste LinkedIn profile text first');return;}
  const result = document.getElementById('li-result');
  result.innerHTML = '<div class="spin2" style="margin-top:10px"><div class="sp"></div>Extracting contact details...</div>';
  try{
    const res = await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-5-20251001',max_tokens:500,
      messages:[{role:'user',content:`Extract contact information from this LinkedIn profile text and return ONLY valid JSON (no markdown):
{"name":"full name","title":"current job title","company":"current company","location":"city, state","email":"if visible","phone":"if visible","linkedin":"linkedin.com/in/username if you can identify it","about":"2-sentence summary of who they are and what they do","notes":"why this person might be relevant for healthcare B2B sales"}

Profile text:
${text.substring(0,2000)}`}]
    })});
    const d = await res.json();
    let txt = extractText(d);
    txt = txt.replace(/\`\`\`json|\`\`\`/g,'').trim();
    const contact = JSON.parse(txt);
    contact.source = 'LinkedIn';
    contact.addedAt = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    contactStorage.unshift(contact);
    result.innerHTML = `<div style="background:var(--g-l);border-radius:var(--rs);padding:10px 12px;margin-top:10px;font-size:12px;color:var(--gd)">
      <strong>✓ Extracted:</strong> ${contact.name} · ${contact.title} at ${contact.company}

    showToast('LinkedIn contact extracted!');
  }catch(e){
    result.innerHTML = '<div style="color:var(--rd);font-size:12px;margin-top:8px">Error extracting. Try again.</div>';
  }
}

function exportToExcel(data, filename, sheetName){
  // Build CSV that Excel opens perfectly
  if(!data||data.length===0){showToast('No data to export');return;}
  const headers = Object.keys(data[0]);
  const rows = [headers, ...data.map(row=>headers.map(h=>{
    const v = row[h]||'';
    const s = String(v).replace(/"/g,'""');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"'+s+'"' : s;
  }))];
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename+'.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✓ Exported '+data.length+' rows to '+filename+'.csv');
}

    const b = document.getElementById('ds-'+x);
    if(b) b.className = 'ds ' + (x==='roi' ? 'roi' : 'inactive');
  });
  
  // Step 4: Render ROI directly
  try {
    renderROI();
  } catch(e) {
    document.getElementById('main').innerHTML = 
      '<div style="padding:20px;color:#ff4d6a;font-size:13px">' +
      '<strong>Error:</strong> ' + e.message + '</div>';
  }
  
  // Step 5: Load contacts in background
  loadContacts();
  
  // Step 6: Start scanning after 5 seconds
  setTimeout(() => {
    try { runScan(); } catch(e) {}
    setInterval(() => { try { runScan(); } catch(e) {} }, 90000);
  }, 5000);
}
</script>
</body>
</html>
