<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ClearsignalQ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00d68f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClearsignalQ">
<style>
:root{--bg:#0a0e1a;--surface:#141928;--surface2:#1a2035;--surface3:#1f2640;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf0;--text2:#8b93a8;--text3:#4a5168;--g:#00d68f;--gl:rgba(0,214,143,.12);--gd:#00a86b;--bl:#4d7cfe;--bll:rgba(77,124,254,.12);--am:#ffb547;--aml:rgba(255,181,71,.12);--rd:#ff4d6a;--rdl:rgba(255,77,106,.12);--pu:#a855f7;--pul:rgba(168,85,247,.12);--cy:#06b6d4;--cyl:rgba(6,182,212,.12);--r:10px;--rs:7px;--sh:0 4px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,214,143,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(77,124,254,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{display:flex;height:100vh;position:relative;z-index:1}

/* PASSWORD */
.pw-screen{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center}
.pw-box{background:rgba(20,25,40,.95);border:1px solid rgba(0,214,143,.2);border-radius:16px;padding:40px 48px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);max-width:420px;width:90%}
.pw-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--g),var(--bl));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;margin:0 auto 20px;font-family:'Space Grotesk',sans-serif}
.pw-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px}
.pw-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.pw-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:.1em;margin-bottom:14px}
.pw-input:focus{border-color:var(--g)}
.pw-btn{width:100%;padding:12px;background:var(--g);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.pw-btn:hover{background:var(--gd)}
.pw-error{color:var(--rd);font-size:12px;margin-top:8px;display:none}

/* SIDEBAR */
.sb{width:220px;background:rgba(14,18,32,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.logo{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.lm{width:30px;height:30px;background:linear-gradient(135deg,var(--g),var(--bl));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:13px;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.lt{font-weight:700;font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.lt span{color:var(--g)}
.lv{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--g);background:var(--gl);padding:2px 7px;border-radius:99px;margin-left:auto;border:1px solid rgba(0,214,143,.2)}
.ld{width:5px;height:5px;background:var(--g);border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ns{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:12px 14px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--gl);color:var(--g);font-weight:500}
.ni i{font-size:15px}
.nb{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center}
.nb-r{background:var(--rd);color:#fff}.nb-g{background:var(--g);color:#000}.nb-a{background:var(--am);color:#000}.nb-p{background:var(--pu);color:#fff}.nb-b{background:var(--bl);color:#fff}
.dash-switch{padding:10px 10px 6px;display:flex;flex-direction:column;gap:3px}
.ds{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:none;width:100%;text-align:left;transition:all .15s;font-family:'Inter',sans-serif}
.ds.roi{background:var(--gl);color:var(--g);border:1px solid rgba(0,214,143,.2)}
.ds.auth{background:var(--rdl);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.ds.chart{background:var(--cyl);color:var(--cy);border:1px solid rgba(6,182,212,.2)}
.ds.inactive{background:var(--surface2);color:var(--text2);border:1px solid transparent}
.ds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:20px;background:transparent}
.topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pt{font-size:20px;font-weight:700;letter-spacing:-.5px;flex:1;font-family:'Space Grotesk',sans-serif}
.psub{font-size:11px;color:var(--text2);margin-top:-8px}

/* STATS */
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sc{background:rgba(20,25,40,.8);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sv{font-size:24px;font-weight:700;letter-spacing:-.5px;font-family:'Space Grotesk',sans-serif}
.ss{font-size:11px;margin-top:3px}

/* CARDS */
.card{background:rgba(20,25,40,.85);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.ct{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;font-family:'Space Grotesk',sans-serif}

/* STREAM */
.stream{display:flex;flex-direction:column;gap:8px}
.sitem{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;gap:11px;cursor:pointer;transition:all .15s;position:relative;background:var(--surface);overflow:hidden}
.sitem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sitem.sh::before{background:var(--g)}.sitem.sm2::before{background:var(--am)}.sitem.sa2::before{background:var(--rd)}.sitem.sc3::before{background:var(--cy)}
.sitem:hover{border-color:var(--border2);background:var(--surface2)}
.so{font-size:13px;font-weight:600;color:var(--text)}.sco{font-size:11px;color:var(--text2);margin:2px 0 5px}.sr{font-size:12px;color:var(--text);line-height:1.6}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.avg{background:rgba(0,214,143,.2);color:var(--g)}.avb{background:rgba(77,124,254,.2);color:var(--bl)}.avp{background:rgba(168,85,247,.2);color:var(--pu)}.ava{background:rgba(255,181,71,.2);color:var(--am)}.avr{background:rgba(255,77,106,.2);color:var(--rd)}.avc{background:rgba(6,182,212,.2);color:var(--cy)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.bh{background:rgba(0,214,143,.15);color:var(--g);border:1px solid rgba(0,214,143,.2)}
.bm{background:rgba(255,181,71,.15);color:var(--am);border:1px solid rgba(255,181,71,.2)}
.bl2{background:rgba(77,124,254,.15);color:var(--bl);border:1px solid rgba(77,124,254,.2)}
.bp{background:rgba(168,85,247,.15);color:var(--pu);border:1px solid rgba(168,85,247,.2)}
.be{background:rgba(255,77,106,.15);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.bg2{background:var(--surface3);color:var(--text2);border:1px solid var(--border)}
.bv{background:rgba(0,214,143,.15);color:var(--g);border:1px solid rgba(0,214,143,.3)}
.ba{background:rgba(255,77,106,.15);color:var(--rd);border:1px solid rgba(255,77,106,.2)}
.bcs{background:rgba(6,182,212,.15);color:var(--cy);border:1px solid rgba(6,182,212,.2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface3)}
.btn-g{background:var(--g);color:#000;border-color:var(--g);font-weight:600}.btn-g:hover{background:var(--gd)}
.btn-sm{padding:4px 10px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.tbl th{font-size:10px;font-weight:600;color:var(--text3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em}
.tbl td{font-size:12px;padding:10px 10px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface2);cursor:pointer}

/* PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.pstage{background:var(--surface);border-radius:var(--rs);padding:10px;min-height:200px;border:1px solid var(--border)}
.psh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.pcard{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 11px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.pcard:hover{border-color:var(--border2)}

/* FORMS */
input[type=text],input[type=email],textarea,select{padding:8px 12px;font-size:12px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,214,143,.08)}
textarea{resize:vertical;min-height:75px}
label{font-size:11px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px}
select option{background:var(--surface2)}

/* MISC */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.row{display:flex;gap:8px;align-items:center}
.rw{display:flex;gap:5px;flex-wrap:wrap}
.erow{display:flex;padding:9px 13px;border-bottom:1px solid var(--border);font-size:12px;gap:10px}
.erow:last-child{border-bottom:none}
.el{color:var(--text2);width:135px;flex-shrink:0;font-size:11px}
.ev{color:var(--text);flex:1;line-height:1.5}
.et{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--surface)}
.scb{height:3px;background:var(--surface3);border-radius:2px;margin-top:3px}
.scf{height:100%;border-radius:2px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.ticker{background:linear-gradient(90deg,rgba(0,214,143,.06),rgba(77,124,254,.06));border:1px solid rgba(0,214,143,.15);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:9px;font-size:11px;color:var(--text2)}
.toast-c{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:9999}
.toast{background:var(--surface2);color:var(--text);border:1px solid var(--border2);padding:9px 16px;border-radius:var(--rs);font-size:12px;animation:tIn .2s ease;box-shadow:var(--sh)}
@keyframes tIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ai-box{background:var(--surface2);border-radius:var(--rs);padding:14px;font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap;border:1px solid var(--border)}
.sp{width:14px;height:14px;border:2px solid rgba(0,214,143,.2);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.spin2{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g);padding:12px 0}
.glow-g{box-shadow:0 0 20px rgba(0,214,143,.1)}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--g);background:var(--gl)}
.rfp-card{border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;background:var(--surface)}
.alert-signal{font-size:11px;color:var(--g);background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.15);padding:5px 9px;border-radius:5px;margin-top:6px;line-height:1.5}
.sbar{background:rgba(20,25,40,.8);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:11px}
.si2{display:flex;align-items:center;gap:5px;color:var(--text2)}
.sd{width:6px;height:6px;border-radius:50%}

/* EMAIL PANEL */
#email-panel{display:none;position:fixed;bottom:0;right:0;width:480px;max-height:70vh;background:rgba(20,25,40,.97);border:1px solid rgba(0,214,143,.3);border-radius:var(--r) var(--r) 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.5);z-index:1000;overflow-y:auto;backdrop-filter:blur(20px)}

/* FILTER CHIPS */
.fchip{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .12s;font-family:'Inter',sans-serif}
.fchip.factive,.fchip:hover{background:var(--g);color:#000;border-color:var(--g)}
</style>
</head>
<body>

<div class="pw-screen" id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">C</div>
    <div class="pw-title">ClearsignalQ</div>
    <div class="pw-sub">Healthcare Intelligence Platform<br>Enter your access password</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPW()">
    <button class="pw-btn" onclick="checkPW()">Access Platform</button>
    <div class="pw-error" id="pw-error">Incorrect password</div>
  </div>
</div>

<div class="app">
<div class="sb">
  <div class="logo">
    <div class="lm">C</div>
    <div class="lt">Clearsignal<span>Q</span></div>
    <div class="lv"><div class="ld"></div>LIVE</div>
  </div>
  <div class="ns">Dashboards</div>
  <div class="dash-switch">
    <button class="ds roi" id="ds-roi" onclick="switchDash('roi')"><div class="ds-dot" style="background:var(--g)"></div>ROI Intelligence</button>
    <button class="ds inactive" id="ds-auth" onclick="switchDash('auth')"><div class="ds-dot" style="background:var(--rd)"></div>Denials</button>
    <button class="ds inactive" id="ds-chart" onclick="switchDash('chart')"><div class="ds-dot" style="background:var(--cy)"></div>Third Party Software</button>
  </div>
  <div class="ns">Intelligence</div>
  <button class="ni" id="ni-alerts" onclick="nav('alerts')"><i class="ti ti-bell-ringing"></i>Live Alerts<span class="nb nb-r" id="nb-al">0</span></button>
  <button class="ni" id="ni-jobs" onclick="nav('jobs')"><i class="ti ti-briefcase"></i>Job Signals<span class="nb nb-p" id="nb-jo">0</span></button>
  <button class="ni" id="ni-news" onclick="nav('news')"><i class="ti ti-news"></i>News Monitor<span class="nb nb-a" id="nb-ne">0</span></button>
  <button class="ni" id="ni-rfp" onclick="nav('rfp')"><i class="ti ti-file-search"></i>RFP Monitor<span class="nb nb-b" id="nb-rfp">4</span></button>
  <button class="ni" id="ni-contracts" onclick="nav('contracts')"><i class="ti ti-file-description"></i>Contracts<span class="nb nb-r" id="nb-co">3</span></button>
  <div class="ns">Prospecting</div>
  <button class="ni" id="ni-contacts" onclick="nav('contacts')"><i class="ti ti-users"></i>Contact Database</button>
  <button class="ni" id="ni-contacts_storage" onclick="nav('contacts_storage')"><i class="ti ti-database-search"></i>Contact Search</button>
  <button class="ni" id="ni-pipeline" onclick="nav('pipeline')"><i class="ti ti-layout-kanban"></i>Pipeline<span class="nb nb-g" id="nb-pi">8</span></button>
  <button class="ni" id="ni-enrich" onclick="nav('enrich')"><i class="ti ti-wand"></i>Enrich Contact</button>
  <div class="ns">Outreach</div>
  <button class="ni" id="ni-drafts" onclick="nav('drafts')"><i class="ti ti-file-text"></i>Suggested Drafts<span class="nb nb-g" id="nb-ob">6</span></button>
  <button class="ni" id="ni-outreach" onclick="nav('outreach')"><i class="ti ti-send"></i>Outreach Sent<span class="nb nb-b" id="nb-sent">0</span></button>
  <button class="ni" id="ni-followups" onclick="nav('followups')"><i class="ti ti-bell"></i>Follow-ups<span class="nb nb-r" id="nb-fu">0</span></button>
  <div class="ns">Platform</div>
  <button class="ni" id="ni-analytics" onclick="nav('analytics')"><i class="ti ti-chart-bar"></i>Analytics</button>
  <button class="ni" id="ni-settings" onclick="nav('settings')"><i class="ti ti-settings"></i>Settings</button>
</div>
<div class="main" id="main"></div>
</div>

<div id="email-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,214,143,.08);border-bottom:1px solid var(--border)">
    <span style="font-size:13px;font-weight:600;color:var(--g);font-family:'Space Grotesk',sans-serif"><i class="ti ti-file-text"></i> <span id="email-panel-title">Email Draft</span></span>
    <button onclick="document.getElementById('email-panel').style.display='none'" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px">×</button>
  </div>
  <div id="email-panel-body" style="padding:16px"></div>
</div>

<div class="toast-c" id="tc"></div>
<script>
// ── PASSWORD ──────────────────────────────────────────────────────────────────
const PW = 'ClearSignal@2026!';
function checkPW(){
  if(document.getElementById('pw-input').value === PW){
    localStorage.setItem('csq_auth','1');
    document.getElementById('pw-screen').style.display='none';
    startApp();
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    setTimeout(()=>document.getElementById('pw-error').style.display='none',2000);
  }
}

// ── AVATAR / INITIALS ─────────────────────────────────────────────────────────
const avC=['avg','avb','avp','ava','avr','avc'];
function av(i){return avC[i%avC.length]}
function ini(n){return (n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?'}

// ── DATA ──────────────────────────────────────────────────────────────────────
const oasisIntel={
  news:'Mar 19, 2026 — Acquired Premier Health (RCM). Oct 2025 — Acquired PreferCare (NC MSO). Backed by GV + Triple Aim Partners.',
  roi:'HIGH — MSO with fragmented HIM across multi-state acquisitions. No standard ROI vendor.',
  auth:'HIGH — MA-heavy population. 56% denial spike 2026. Premier Health acquisition = RCM integration need.',
  chart:'HIGH — Multi-state provider network. Post-acquisition fragmentation = no standard B2B record exchange.',
};

async function cleanupNoEmail(){
  if(!confirm('Remove all contacts without email addresses?')) return;
  try{
    const res = await fetch('/api/contacts/cleanup/no-email', {method:'DELETE'});
    const data = await res.json();
    showToast('Removed '+data.deleted+' contacts without emails');
    loadContacts();
  }catch(e){ showToast('Error: '+e.message); }
}

async function pullContactsNow(){
  showToast('Pulling contacts from Apollo for all 10 channel targets...');
  try{
    const res = await fetch('/api/pull-contacts', {method:'POST'});
    if(res.ok){ showToast('Pull started! Check back in 2-3 minutes for new contacts.'); setTimeout(()=>loadContacts(), 180000); }
  }catch(e){ showToast('Error: '+e.message); }
}

async function loadContacts(){
  try{
    const res = await fetch('/api/contacts?limit=500');
    if(res.ok){
      const data = await res.json();
      contactStorage = data.contacts.map(c=>({
        id: c.id, name: c.name||'', title: c.title||'', company: c.company||'',
        email: c.email||'', phone: c.phone||'', location: c.location||'',
        linkedin: c.linkedin||'', website: c.website||'',
        source: c.source||'Imported', orgType: c.org_type||'',
        dealType: c.deal_type||'provider', notes: c.notes||'',
        score: c.score||80, addedAt: c.added_at
      }));
      if(currentPage==='contacts_storage') renderContactStorage();
      if(currentPage==='contacts') renderContacts();
    }
  }catch(e){
    try{ const saved = localStorage.getItem('csq_contacts'); if(saved) contactStorage = JSON.parse(saved); }catch(e2){}
  }
}

async function saveContactToDB(contact){
  try{
    const res = await fetch('/api/contacts', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name: contact.name||'', title: contact.title||'', company: contact.company||'', email: contact.email||'', phone: contact.phone||'', location: contact.location||'', linkedin: contact.linkedin||'', website: contact.website||'', source: contact.source||'Manual', org_type: contact.orgType||'', deal_type: contact.dealType||'provider', notes: contact.notes||'', score: contact.score||80 })
    });
    return res.ok;
  }catch(e){ return false; }
}

async function saveBulkContactsToDB(contacts){
  try{
    const res = await fetch('/api/contacts/bulk', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({contacts}) });
    const data = await res.json();
    return data.saved || 0;
  }catch(e){ return 0; }
}

function channelBadge(){
  return '<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:linear-gradient(90deg,rgba(0,214,143,.2),rgba(77,124,254,.2));color:var(--g);border:1px solid rgba(0,214,143,.3)">⚡ CHANNEL</span>';

function filterLeads(leads,dash){
  const f=activeFilters[dash];
  if(f==='All') return leads;
  if(f==='Channel') return leads.filter(l=>l.dealType==='channel');
  if(f==='Provider Direct') return leads.filter(l=>l.dealType==='provider');
  return leads.filter(l=>l.orgType===f);
}

function buildFilterBar(leads,dash){
  const types=['All','Channel','Provider Direct',...[...new Set(leads.map(l=>l.orgType).filter(Boolean))].sort()];
  const cur=activeFilters[dash];
  return '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">'+
    types.map(t=>'<button class="fchip'+(t===cur?' factive':'')+'" onclick="setFilter(\''+dash+'\',\''+encodeURIComponent(t)+'\',this)">'+t+'</button>').join('')+
  '</div>';
}

function setFilter(dash,encT,btn){
  const t=decodeURIComponent(encT);
  activeFilters[dash]=t;
  document.querySelectorAll('.fchip').forEach(b=>{b.classList.remove('factive');if(b===btn)b.classList.add('factive');});
  if(dash==='roi') renderROI();
  else if(dash==='auth') renderAuth();
  else renderChart();
}

function switchDash(d){
  currentDash=d;currentPage='dashboard';
  ['roi','auth','chart'].forEach(x=>{ document.getElementById('ds-'+x).className='ds '+(x===d?d:'inactive'); });
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  if(d==='roi') renderROI();

  else renderChart();
}

function nav(p){
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  const ni=document.getElementById('ni-'+p);
  if(ni) ni.classList.add('active');
  currentPage=p;
  const fns={alerts:renderAlerts,jobs:renderJobs,news:renderNews,rfp:renderRFP,contracts:renderContracts,contacts:renderContacts,contacts_storage:renderContactStorage,pipeline:renderPipeline,enrich:renderEnrich,drafts:renderDrafts,outreach:renderOutreach,followups:renderFollowups,analytics:renderAnalytics,settings:renderSettings};
  if(fns[p]) fns[p]();
}

function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n');
    const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
    let added=0;
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const row={};headers.forEach((h,idx)=>{row[h]=(vals[idx]||'').replace(/^"|"$/g,'').trim();});
      if(row['First Name']||row['Company Name']){
        contactStorage.push({n:(row['First Name']||'')+' '+(row['Last Name']||''),t:row['Job Title']||'',c:row['Company Name']||'',e:row['Email Address']||'',p:row['Mobile phone']||row['Direct Phone Number']||'',l:(row['Person City']||'')+(row['Person State']?', '+row['Person State']:''),li:row['LinkedIn Contact Profile URL']||'',s:'ZoomInfo'});
        added++;
      }
    }
    showToast('Imported '+added+' contacts!');
  };
  reader.readAsText(file);
}

function importContactFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){showToast('File appears empty');return;}
    const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const find=(...keys)=>{for(const k of keys){const i=headers.findIndex(h=>h.includes(k.toLowerCase()));if(i>=0)return i;}return -1;};
    const cols={name:find('full name','name'),fname:find('first name','firstname'),lname:find('last name','lastname'),title:find('title','job title','position'),company:find('company','organization','account'),email:find('email','e-mail'),phone:find('phone','mobile','cell'),linkedin:find('linkedin','profile url'),location:find('location','city')};
    let added=0;
    for(let i=1;i<lines.length;i++){
      const vals=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const get=col=>col>=0&&col<vals.length?vals[col].replace(/^"|"$/g,'').trim():'';
      const name=get(cols.name)||(get(cols.fname)+' '+get(cols.lname)).trim();
      const company=get(cols.company);
      if(!name&&!company)continue;
      contactStorage.push({n:name,t:get(cols.title),c:company,e:get(cols.email),p:get(cols.phone),l:get(cols.location),li:get(cols.linkedin),s:'Excel'});
      added++;
    }
    showToast('Importing '+added+' contacts to database...');
    saveBulkContactsToDB(contactStorage).then(saved=>showToast('Saved '+saved+' contacts to database!'));
    renderContactStorage();
  };
  reader.readAsText(file);
}

function moveDeal(id,s){
  const stages=['New','Contacted','Meeting Booked','Proposal Sent','Closed'];
  const idx=stages.indexOf(s);if(idx>=stages.length-1){showToast('Already at Closed!');return;}
  const next=stages[idx+1];

const SCAN_MODES=[
  {mode:'rss',label:'RSS feeds',endpoint:'/api/scan-sources'},
  {mode:'jobs',label:'Job boards',endpoint:null,q:'release of information specialist HIM healthcare hiring 2026'},
  {mode:'google',label:'Google News',endpoint:'/api/scan-sources'},

  {mode:'sites',label:'Company sites',endpoint:'/api/monitor-sites'},
  {mode:'cms',label:'CMS/HHS/SEC',endpoint:'/api/scan-sources'},
  {mode:'denials',label:'Denial signals',endpoint:'/api/scan-sources'},
  {mode:'press',label:'Press releases',endpoint:'/api/scan-sources'},
  {mode:'jobs2',label:'HIM jobs',endpoint:null,q:'health information management director ROI job 2026'},
  {mode:'mergers',label:'M&A signals',endpoint:'/api/scan-sources'},
];
let lastScanMode='';

async function runScan(){
  if(isScanning)return;
  isScanning=true;totalScans++;lastScan=new Date();
  try{updateSbar();}catch(e){}
  const mode=SCAN_MODES[totalScans%SCAN_MODES.length];
  lastScanMode=mode.label;
  try{
    let items=[];
    if(mode.endpoint==='/api/monitor-sites'){
      const res=await fetch('/api/monitor-sites',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
      const d=await res.json();
      items=d.items||[];
    } else if(mode.endpoint==='/api/scan-sources'){
      const res=await fetch('/api/scan-sources',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
      const d=await res.json();
      items=d.items||[];
    } else {
      const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20251001',max_tokens:1200,useWebSearch:true,useScanKey:true,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:'Search the web for: "'+mode.q+'"\n\nAfter searching, return ONLY a valid JSON array with 2-4 real healthcare signals:\n[{"type":"jobs","org":"real org name","headline":"specific finding","signal":"why this matters for ROI/denial/records exchange","urgency":"high|medium|low","contact":"decision-maker title","location":"city, state","tags":["tag1","tag2"],"source":"publication name","receivedAt":"'+new Date().toLocaleTimeString()+'"}]\nOnly return the JSON array starting with [ and ending with ].'}]})});
      const d=await res.json();
      let raw=extractText(d).replace(/```json|```/g,'').trim();
      const s=raw.indexOf('['),e=raw.lastIndexOf(']');
      if(s!==-1&&e!==-1){try{items=JSON.parse(raw.substring(s,e+1));}catch(pe){}}
    }
    items.forEach(item=>{
      const a={...item,id:'a'+Date.now()+Math.random(),isNew:true,scanMode:mode.label};
      const isJob=mode.mode==='jobs'||mode.mode==='jobs2'||(item.type==='jobs');
      if(isJob){liveJobs.unshift(a);if(liveJobs.length>100)liveJobs.pop();}
      else{liveNews.unshift(a);if(liveNews.length>100)liveNews.pop();}
      liveAlerts.unshift(a);if(liveAlerts.length>200)liveAlerts.pop();
    });
    document.getElementById('nb-al').textContent=liveAlerts.length;
    document.getElementById('nb-jo').textContent=liveJobs.length;
    document.getElementById('nb-ne').textContent=liveNews.length;
    if(items.length>0&&items.some(i=>i.urgency==='high'))showToast('New high-priority signal via '+mode.label);
    else if(items.length>0)showToast(items.length+' signals from '+mode.label);
    else showToast('Scanned '+mode.label+' — no new signals');
  }catch(err){
    console.error('Scan error:',err.message);
    showToast('Scan error: '+err.message);
  }
  isScanning=false;
  try{updateSbar();}catch(e){}
  if(['alerts','jobs','news'].includes(currentPage)){
    if(currentPage==='alerts')renderAlerts();
    else if(currentPage==='jobs')renderJobs();
    else renderNews();
  }
}

// ── EMAIL GENERATORS ──────────────────────────────────────────────────────────
function extractText(d){
  if(!d) return 'ERROR: No response';
  if(d.type==='error'||d.error) return 'API ERROR: '+(d.error&&d.error.message?d.error.message:JSON.stringify(d.error));
  if(!d.content||!Array.isArray(d.content)) return 'ERROR: '+JSON.stringify(d).substring(0,200);
  const texts=[];
  for(const block of d.content){
    if(block.type==='text'&&block.text&&block.text.trim()) texts.push(block.text.trim());
    if(block.type==='tool_result'){
      const content=Array.isArray(block.content)?block.content:[block.content];
      for(const c of content){ if(c&&c.type==='text'&&c.text) texts.push(c.text); }
    }
  }
  return texts.length>0?texts.join('\n\n'):'ERROR: No text in response. Blocks: '+d.content.map(b=>b.type).join(',');
}

  };
  try{
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20251001',max_tokens:380,messages:[{role:'user',content:prompts[product]||prompts.roi}]})});

}

function showEmailDraft(txt){
  document.getElementById('email-panel-body').innerHTML=
    '<div style="font-size:11px;color:var(--text2);background:rgba(255,181,71,.1);border-radius:var(--rs);padding:7px 10px;margin-bottom:10px">Copy → paste into Outlook → send → click <strong style="color:var(--g)">Mark as Sent</strong></div>'+
    '<div class="ai-box">'+txt+'</div>'+
    '<div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap">'+
      '<button class="btn btn-g btn-sm" onclick="copyDraft()"><i class="ti ti-copy"></i>Copy</button>'+
      '<button class="btn btn-sm" style="background:var(--g);color:#000;border-color:var(--g);font-weight:600" onclick="markDraftSent()"><i class="ti ti-check"></i>Mark as Sent</button>'+
      '<button class="btn btn-sm" onclick="document.getElementById(\'email-panel\').style.display=\'none\'"><i class="ti ti-x"></i></button>'+
    '</div>';
}

function copyDraft(){
  const box=document.querySelector('#email-panel-body .ai-box');
  if(box){navigator.clipboard.writeText(box.textContent).catch(()=>{});showToast('Copied!');}
}

function markDraftSent(){
  const d=window._pendingDraft;if(!d)return;
  const fu=new Date();fu.setDate(fu.getDate()+7);
  const fuStr=fu.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  drafts.unshift({id:'e'+Date.now(),to:d.email||'',toName:d.name,org:d.company,subject:d.subject,body:d.text,created:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),status:'sent',followUpDue:fuStr,followUpDone:false,seq:1,product:d.product});
  document.getElementById('nb-ob').textContent=drafts.length;
  document.getElementById('nb-sent').textContent=drafts.filter(x=>x.status==='sent').length;
  document.getElementById('nb-fu').textContent=drafts.filter(x=>x.followUpDue&&!x.followUpDone).length;
  document.getElementById('email-panel-body').innerHTML='<div style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:10px">✅</div><div style="font-size:13px;font-weight:600;color:var(--g)">Sent & logged!</div><div style="font-size:12px;color:var(--text2);margin-top:6px">Follow-up reminder: <strong style="color:var(--am)">'+fuStr+'</strong></div><button class="btn btn-sm" style="margin-top:10px" onclick="document.getElementById(\'email-panel\').style.display=\'none\'">Close</button></div>';
  showToast('Email logged! Follow-up: '+fuStr);
  window._pendingDraft=null;
}

// ── APOLLO ────────────────────────────────────────────────────────────────────
async function searchApollo(){
  const title=document.getElementById('ap-title').value.trim();
  const industry=document.getElementById('ap-industry').value;
  const location=document.getElementById('ap-location').value.trim();
  const size=document.getElementById('ap-size').value;
  if(!title){showToast('Enter a job title to search');return;}
  const results=document.getElementById('apollo-results');
  results.innerHTML='<div class="spin2"><div class="sp"></div>Searching Apollo for '+title+'...</div>';
  try{
    const res=await fetch('/api/apollo-search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,industry,location,size})});
    const data=await res.json();
    if(data.error){results.innerHTML='<div style="font-size:12px;color:var(--rd);padding:10px">Apollo error: '+data.error+'</div>';return;}
    const contacts=data.people||[];
    if(contacts.length===0){results.innerHTML='<div style="font-size:12px;color:var(--text2);padding:10px">No contacts found. Try different search terms.</div>';return;}
    window._apolloResults=contacts;
    results.innerHTML=
      '<div style="font-size:12px;font-weight:600;color:var(--g);margin-bottom:4px">'+contacts.length+' contacts with verified emails</div>'+
      '<div style="max-height:300px;overflow-y:auto">'+
      '<table class="tbl"><thead><tr><th style="width:150px">Name</th><th style="width:140px">Title</th><th style="width:150px">Company</th><th style="width:170px">Email</th><th style="width:110px">Location</th><th style="width:80px"></th></tr></thead><tbody>'+
      contacts.map((c,i)=>{
        const name=(c.first_name||'')+' '+(c.last_name||'');
        const company=c.organization?c.organization.name||'':'';
        const loc=[c.city,c.state].filter(Boolean).join(', ');
        return '<tr><td style="font-weight:600">'+name+'</td><td style="font-size:11px;color:var(--text2)">'+(c.title||'').substring(0,25)+'</td><td>'+company+'</td><td style="font-size:11px;color:var(--bl)">'+(c.email||'')+'</td><td style="font-size:11px">'+loc+'</td><td><button class="btn btn-g btn-xs" onclick="saveApolloContact('+i+')"><i class="ti ti-plus"></i>Save</button></td></tr>';
      }).join('')+
      '</tbody></table></div>'+
      '<div style="margin-top:10px"><button class="btn btn-g btn-sm" onclick="saveAllApollo()"><i class="ti ti-users"></i>Save all '+contacts.length+' contacts</button></div>';
  }catch(e){results.innerHTML='<div style="font-size:12px;color:var(--rd);padding:10px">Error: '+e.message+'</div>';}
}

async function saveApolloContact(idx){
  const c=window._apolloResults?.[idx];if(!c)return;
  const name=((c.first_name||'')+' '+(c.last_name||'')).trim();
  const company=c.organization?c.organization.name||'':'';
  const contact={name,title:c.title||'',company,email:c.email||'',phone:c.phone_numbers?.[0]?.raw_number||'',location:[c.city,c.state].filter(Boolean).join(', '),linkedin:c.linkedin_url||'',website:c.organization?.website_url||'',source:'Apollo',orgType:'Health System',dealType:'provider',score:80};
  const ok=await saveContactToDB(contact);
  contactStorage.unshift(contact);
  showToast(name+' saved!'+(ok?' ✓':' (offline)'));
}

async function saveAllApollo(){
  const allContacts=window._apolloResults||[];
  const contacts=allContacts.filter(c=>c.email);
  if(!contacts.length){showToast('No contacts with verified emails found');return;}
  const mapped=contacts.map(c=>({name:((c.first_name||'')+' '+(c.last_name||'')).trim(),title:c.title||'',company:c.organization?c.organization.name||'':'',email:c.email||'',phone:c.phone_numbers?.[0]?.raw_number||'',location:[c.city,c.state].filter(Boolean).join(', '),linkedin:c.linkedin_url||'',website:c.organization?.website_url||'',source:'Apollo',orgType:'Health System',dealType:'provider',score:80}));
  const saved=await saveBulkContactsToDB(mapped);
  contactStorage.unshift(...mapped);
  showToast('Saved '+saved+' contacts to database!');
  renderContactStorage();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportToExcel(data,filename){
  if(!data||!data.length){showToast('No data to export');return;}
  const headers=Object.keys(data[0]);
  const rows=[headers,...data.map(row=>headers.map(h=>{const v=String(row[h]||'').replace(/"/g,'""');return v.includes(',')||v.includes('"')?'"'+v+'"':v;}))];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Exported to '+filename+'.csv');
}
